name: CI / CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r polymarket_arbitrage_requirements.txt

      - name: Run tests
        run: |
          cd services/polymarket-arb && pytest tests/ -q

      - name: Build Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t brandontech/polymarket-arb:${{ github.sha }} -f services/polymarket-arb/Dockerfile services/polymarket-arb

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push brandontech/polymarket-arb:${{ github.sha }}

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.13.0"

      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Helm upgrade/install
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          helm upgrade --install polymarket-arb ./helm/openclaw \
            --namespace arbitrage \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --wait
