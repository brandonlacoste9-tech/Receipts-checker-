# Kubernetes Secrets for Polymarket Arbitrage Service
# IMPORTANT: Replace all <your-*> placeholders with actual values
# Apply with: kubectl apply -f 02-k8s-secrets.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: polymarket-secret
  namespace: arbitrage
type: Opaque
stringData:
  POLYMARKET_API_KEY: "<your-polymarket-api-key>"
---
apiVersion: v1
kind: Secret
metadata:
  name: alpaca-secret
  namespace: arbitrage
type: Opaque
stringData:
  ALPACA_API_KEY: "<your-alpaca-api-key>"
  ALPACA_SECRET_KEY: "<your-alpaca-secret-key>"
---
apiVersion: v1
kind: Secret
metadata:
  name: stripe-secret
  namespace: arbitrage
type: Opaque
stringData:
  STRIPE_WEBHOOK_SECRET: "<your-stripe-webhook-secret>"
  STRIPE_SECRET_KEY: "<your-stripe-secret-key>"
---
apiVersion: v1
kind: Secret
metadata:
  name: twitter-brave-secret
  namespace: arbitrage
type: Opaque
stringData:
  TWITTER_BEARER_TOKEN: "<your-twitter-bearer-token>"
  BRAVE_API_KEY: "<your-brave-api-key>"
---
apiVersion: v1
kind: Secret
metadata:
  name: external-llm-secret
  namespace: arbitrage
type: Opaque
stringData:
  API_KEY: "<your-openai-or-deepseek-api-key>"
