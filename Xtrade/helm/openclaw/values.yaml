# Default values for the Polymarket arbitrage Helm chart.
replicaCount: 1

image:
  repository: brandontech/polymarket-arb
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8000

# -------------------- Persistent Volume --------------------
pvc:
  enabled: true
  size: 5Gi
  storageClassName: ""

# -------------------- Environment variables --------------------
env:
  - name: PAPER_TRADING
    value: "1"
  - name: OLLAMA_MODEL
    value: "phi3:mini"
  - name: OLLAMA_ENDPOINT
    value: "http://127.0.0.1:11434"
  - name: USE_EXTERNAL_LLM
    value: "0"
  - name: EXTERNAL_LLM
    value: "openai"
  - name: REVENUE_TARGET_CENTS
    value: "50000"
  - name: LOOKBACK_DAYS
    value: "30"
  - name: POLYMARKET_API_KEY
    valueFrom:
      secretKeyRef:
        name: polymarket-secret
        key: POLYMARKET_API_KEY
  - name: ALPACA_API_KEY
    valueFrom:
      secretKeyRef:
        name: alpaca-secret
        key: ALPACA_API_KEY
  - name: ALPACA_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: alpaca-secret
        key: ALPACA_SECRET_KEY
  - name: STRIPE_WEBHOOK_SECRET
    valueFrom:
      secretKeyRef:
        name: stripe-secret
        key: STRIPE_WEBHOOK_SECRET
  - name: STRIPE_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: stripe-secret
        key: STRIPE_SECRET_KEY
  - name: TWITTER_BEARER_TOKEN
    valueFrom:
      secretKeyRef:
        name: twitter-brave-secret
        key: TWITTER_BEARER_TOKEN
  - name: EXTERNAL_LLM_API_KEY
    valueFrom:
      secretKeyRef:
        name: external-llm-secret
        key: API_KEY

# -------------------- Resources --------------------
resources: {}

# -------------------- Autoscaling --------------------
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# -------------------- Prometheus --------------------
prometheus:
  enabled: true
  path: /metrics
  port: 8000

nodeSelector: {}
tolerations: []
affinity: {}
